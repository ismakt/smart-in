<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vadilion Digital — Europe Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden; background:#1c1b1b;}
.wrap{
  background:"#223047";
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  font-family:"Inter",system-ui,sans-serif;
  overflow:hidden;
  position:relative;
}
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px 10px;
  flex-shrink:0;
  min-height:72px;
  position:relative;
  z-index:20;
  background:#111827;
}

.top-bar > div:first-child{
  display:flex;
  flex-direction:column;
}

  
.brand-name{
  font-size:clamp(13px,1.6vw,17px);
  font-weight:700;letter-spacing:.09em;color:#ffd84d;
  opacity:0;animation:fu .5s ease forwards .3s;
}
.brand-sub{
  font-size:clamp(12px,1.3vw,14.3px);
  color:rgba(255,255,255,.82);margin-top:2px;
  opacity:0;animation:fu .5s ease forwards .5s;
}
.live-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;

  background:rgba(255,59,48,.12);
  border:1px solid rgba(255,59,48,.35);

  border-radius:20px;

  padding:4px 10px;

  opacity:0;
  animation:fu .5s ease forwards .7s;

  flex-shrink:0;

  width:auto;
  min-width:auto;
  max-width:max-content;

  align-self:center;
}
.live-dot{width:5px;height:5px;border-radius:50%;background:#ff3b30;animation:blink 1.3s ease-in-out infinite}
.live-txt{font-size:clamp(8px,.9vw,10px);font-weight:600;color:#ff7b73;letter-spacing:.06em}
.map-container{
  flex:1;
  position:relative;
  overflow:hidden;
  min-height:0;
}
#map-svg{
  display:block;
  width:100%;
  height:100%;
  position:absolute;
  top:0;left:0;
}
#overlay-brand{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;opacity:0;pointer-events:none;
  transition:opacity .8s ease;z-index:5;
}
#overlay-brand.show{opacity:1}
.ob-name{
  font-size:clamp(18px,3.5vw,36px);
  font-weight:800;color:#ffd84d;letter-spacing:.1em;
  text-shadow:0 0 40px rgba(255,216,77,0.2);
  white-space:nowrap;
}
.ob-sub{
  font-size:clamp(9px,1.2vw,13px);
  font-weight:500;color:rgba(255,255,255,0.45);
  letter-spacing:.14em;margin-top:4px;
}
#pw-panel{
  position:absolute;
  bottom:clamp(12px,2.5vh,28px);
  right:clamp(10px,2vw,24px);
  background:rgba(6,7,9,0.92);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:clamp(8px,1.2vh,12px) clamp(10px,1.5vw,16px);
  
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:8px;
  
  opacity:0;transform:translateX(80px);
  z-index:10;
  flex-wrap:wrap;
  max-width:calc(100% - 20px);
}

  #pw-title{
  width:100%;

  font-size:13px;
  font-weight:700;
  letter-spacing:.12em;
  text-transform:uppercase;

  color:#ffd84d;

  margin-bottom:4px;
}
  
#pw-panel.slide-in{animation:slideIn .7s cubic-bezier(.22,1,.36,1) forwards}
@keyframes slideIn{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
#pw-label{
  font-size:clamp(9px,1vw,11px);font-weight:600;
  color:rgba(255,255,255,0.45);letter-spacing:.07em;white-space:nowrap;
}
#pw-input{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;padding:5px 8px;color:#eaeef7;
  font-size:clamp(10px,1.1vw,12px);
  font-family:"Inter",system-ui,sans-serif;
  outline:none;width:clamp(80px,12vw,130px);transition:border-color .2s;
}
#pw-input:focus{border-color:rgba(255,59,48,0.5)}
#pw-input::placeholder{color:rgba(255,255,255,0.2)}
#pw-input.error{border-color:rgba(255,59,48,0.8);animation:shake .3s ease}
#pw-input.success{border-color:rgba(80,220,120,0.7)}
#pw-btn{
  background:rgba(255,59,48,0.15);border:1px solid rgba(255,59,48,0.35);
  border-radius:7px;padding:5px 10px;color:#ff7b73;
  font-size:clamp(9px,1vw,11px);font-weight:600;cursor:pointer;
  font-family:"Inter",system-ui,sans-serif;transition:background .2s;white-space:nowrap;
}
#pw-btn:hover{background:rgba(255,59,48,0.28)}
#pw-msg{font-size:clamp(9px,1vw,10px);white-space:nowrap;opacity:0;transition:opacity .3s}
  #pw-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
#city-tooltip{
  position:absolute;background:rgba(8,10,18,0.95);
  border:1px solid rgba(255,59,48,0.45);border-radius:8px;
  padding:6px 10px;pointer-events:none;opacity:0;transition:opacity .15s;
  font-size:clamp(9px,1vw,11px);color:#eaeef7;white-space:nowrap;z-index:20;
}
.tt-name{font-weight:700;font-size:clamp(10px,1.1vw,12px);color:#ff7b73;margin-bottom:2px}
.tt-status{color:rgba(255,255,255,0.5);font-size:clamp(8px,.9vw,10px)}
#city-tooltip.soon .tt-name{color:rgba(255,255,255,0.6)}
#city-tooltip.soon{border-color:rgba(255,255,255,0.15)}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes pulseRed{0%{opacity:.55}100%{opacity:0;r:22}}
@keyframes pulseSoon{0%{opacity:.3}100%{opacity:0}}
@keyframes popDot{0%{opacity:0}60%{opacity:1}100%{opacity:1}}
@keyframes fadeLabel{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<div class="wrap">
  <div class="top-bar">
    <div>
      <div class="brand-name">VADILION DIGITAL</div>
      <div class="brand-sub">Smart-In &nbsp;·&nbsp; Brussels</div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <div class="live-txt">LIVE</div>
    </div>
  </div>

  <div class="map-container">
    <svg id="map-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    
    
    <div id="pw-panel">

  <div id="pw-title">Premium Access</div>

  <div id="pw-row">
    <span id="pw-label">ENTER PASSWORD</span>

    <input id="pw-input"
           type="password"
           placeholder="••••••••"/>

    <button id="pw-btn">Unlock</button>
  </div>

  <span id="pw-msg"></span>

</div>

    
    
    <div id="city-tooltip">
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-status" id="tt-status"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
(async () => {
  const PASSWORD_FREE    = "1";
  const PASSWORD_PREMIUM = "premium123";

  const svgEl     = document.getElementById("map-svg");
  const wrapEl    = document.querySelector(".wrap");
  const container = document.querySelector(".map-container");
  const svg       = d3.select(svgEl);

  function getDims() {
    return { W: container.clientWidth, H: container.clientHeight };
  }

function makeProjection(W, H) {
  const scale = Math.min(W, H) * 2.0;

  return d3.geoMercator()
    .center([8, 43])
    .scale(scale)
    .translate([W * 0.50, H * 0.58]);
}


  

  const world     = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json");
  const countries = topojson.feature(world, world.objects.countries);
  const borders   = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

const europeIds = new Set([
  // Europe occidentale
  "250", // France
  "056", // Belgium
  "528", // Netherlands
  "276", // Germany
  "442", // Luxembourg
  "756", // Switzerland
  "040", // Austria
  "826", // United Kingdom
  "372", // Ireland

  // Europe du Sud
  "724", // Spain
  "620", // Portugal
  "380", // Italy
  "470", // Malta
  "300", // Greece
  "196", // Cyprus

  // Scandinavie / Nord
  "578", // Norway
  "752", // Sweden
  "246", // Finland
  "208", // Denmark
  "352", // Iceland

  // Europe centrale
  "616", // Poland
  "203", // Czechia
  "703", // Slovakia
  "348", // Hungary
  "705", // Slovenia

  // Balkans
  "191", // Croatia
  "070", // Bosnia and Herzegovina
  "688", // Serbia
  "499", // Montenegro
  "807", // North Macedonia
  "008", // Albania
  "300", // Greece
  "100", // Bulgaria
  "642", // Romania
  "498", // Moldova
  "688", // Serbia
  "070", // Bosnia

  // Baltique
  "233", // Estonia
  "428", // Latvia
  "440", // Lithuania

  // Europe de l’Est
  "804", // Ukraine
  "112", // Belarus

  // Caucase
  "268", // Georgia
  "051", // Armenia
  "031", // Azerbaijan

  // Russie européenne
  "643", // Russia

  // Turquie
  "792", // Turkey

  // Microstates
  "020", // Andorra
  "674", // San Marino
  "336", // Vatican
  "438", // Liechtenstein
  "492", // Monaco

  // Kosovo (souvent absent selon dataset)
  "383", // Kosovo

  // Maghreb (optionnel géopolitique/méditerranéen)
  "012", // Algeria
  "504", // Morocco
  "788", // Tunisia
  "434", // Libya
  "818", // Egypt

  // Levant (optionnel)
  "422", // Lebanon
  "376", // Israel
  "400", // Jordan
  "760", // Syria

  // Mer Noire / Eurasie
  "398", // Kazakhstan
]);

  

const cities = [
  {name:"Brussels",     lon:4.35,  lat:50.85, status:"ready",          delay:1.0},

  {name:"Paris",        lon:2.35,  lat:48.85, status:"development..",    delay:1.2},
  {name:"Nice-Monaco",  lon:7.26,  lat:43.71, status:"development..",    delay:1.3},
  {name:"London",       lon:-0.12, lat:51.51, status:"development..",    delay:1.5},
  {name:"Barcelona",    lon:2.17,  lat:41.39, status:"development..",    delay:1.7},
  {name:"Milan",        lon:9.19,  lat:45.46, status:"development..",    delay:1.8},
  {name:"Lisbon",       lon:-9.14, lat:38.72, status:"development..",    delay:1.9},
];

  const primaryCities = ["Brussels"];
const labelCities = [
  "Paris",
  "Nice-Monaco",
  "London",
  "Barcelona",
  "Milan",
  "Lisbon"
];
  const tooltip  = document.getElementById("city-tooltip");
  const ttName   = document.getElementById("tt-name");
  const ttStatus = document.getElementById("tt-status");

  function showTooltip(cx, cy, name, statusText, isSoon) {
    const svgRect  = svgEl.getBoundingClientRect();
    const wrapRect = wrapEl.getBoundingClientRect();
    const {W, H}   = getDims();
    const scaleX   = svgRect.width  / W;
    const scaleY   = svgRect.height / H;
    const tx = cx * scaleX + svgRect.left - wrapRect.left;
    const ty = cy * scaleY + svgRect.top  - wrapRect.top;
    ttName.textContent   = name.toUpperCase();
    ttStatus.textContent = statusText;
    tooltip.className    = isSoon ? "soon" : "";
    tooltip.style.left   = (tx + 12) + "px";
    tooltip.style.top    = (ty - 30) + "px";
    tooltip.style.opacity = "1";
  }
  function hideTooltip() { tooltip.style.opacity = "0"; }

  function render(animate) {
    const {W, H} = getDims();
    svg.attr("viewBox", `0 0 ${W} ${H}`);
    const proj = makeProjection(W, H);
    const path = d3.geoPath().projection(proj);

    svg.selectAll("*").remove();

    svg.append("rect").attr("width", W).attr("height", H).attr("fill", "#121212");

    const grat = d3.geoGraticule().step([10, 10]);
    svg.append("path").datum(grat()).attr("d", path)
      .attr("fill","none").attr("stroke","rgba(255,255,255,0.035)").attr("stroke-width",0.4);

    svg.append("g").selectAll("path")
      .data(countries.features.filter(d => europeIds.has(d.id)))
      .join("path").attr("d", path)
      .attr("fill","#1d1e1f").attr("stroke","#1e2d45").attr("stroke-width",0.7);

    svg.append("path").datum(borders).attr("d", path)
      .attr("fill","none").attr("stroke","#1e3050").attr("stroke-width",0.5);

    const connPairs = [ ["Brussels","Paris"] , ["Paris","Nice-Monaco"] ,["Paris","London"] ,["Nice-Monaco","Milan"] ,["Nice-Monaco","Barcelona"] ,["Barcelona","Lisbon"] ];
    connPairs.forEach(([a, b]) => {
      const ca = cities.find(c => c.name === a);
      const cb = cities.find(c => c.name === b);
      const pa = proj([ca.lon, ca.lat]);
      const pb = proj([cb.lon, cb.lat]);
      const delay = Math.max(ca.delay, cb.delay) + 0.25;
      const line = svg.append("line")
        .attr("x1",pa[0]).attr("y1",pa[1]).attr("x2",pb[0]).attr("y2",pb[1])
        .attr("stroke","rgba(255,255,255,0.4)").attr("stroke-width",1.6)
        .attr("stroke-dasharray","4 3").style("opacity", 0);
      if (animate) setTimeout(() => line.transition().duration(600).style("opacity",1), delay * 1000);
      else line.style("opacity", 1);
    });

    cities.forEach(c => {
      const [cx, cy] = proj([c.lon, c.lat]);
      const isPrimary = primaryCities.includes(c.name);
      const isReady   = c.status === "ready";
      const isSoon    = c.status === "development..";
      const dotR      = isPrimary ? Math.max(3, W * 0.007) : Math.max(2, W * 0.004);

      
let dotColor;
let dotStroke;

if (c.name === "Brussels") {
  dotColor = "#32d74b"; // vert
  dotStroke = "rgba(255,255,255,0.95)";
}
else if (
  c.name === "Paris" ||
  c.name === "Nice-Monaco" ||
  c.name === "London" ||
  c.name === "Milan" ||
  c.name === "Barcelona" ||
  c.name === "Lisbon"
) {
  dotColor = "#ffd84d"; // jaune
  dotStroke = "rgba(255,255,255,0.9)";
}



      
      if (isReady) {
        [0, 1].forEach(i => {
          const r = svg.append("circle")
            .attr("cx",cx).attr("cy",cy).attr("r",dotR * 1.8)
            .attr("fill","none")
            .attr("stroke", `rgba(255,59,48,${i === 0 ? 0.5 : 0.3})`)
            .attr("stroke-width",1).style("opacity",0);
          const delay = animate ? (c.delay + 0.1) * 1000 : 0;
          setTimeout(() => {
            r.style("opacity",1)
             .style("animation", `pulseRed 2.6s ease-out ${i === 0 ? 0 : 1.3}s infinite`);
          }, delay);
        });
      }

      if (isSoon) {
        const rs = svg.append("circle")
          .attr("cx",cx).attr("cy",cy).attr("r",dotR * 1.8)
          .attr("fill","none").attr("stroke","rgba(255,255,255,0.2)")
          .attr("stroke-width",1).style("opacity",0);
        const delay = animate ? (c.delay + 0.1) * 1000 : 0;
        setTimeout(() => {
          rs.style("opacity",1)
            .style("animation","pulseSoon 2.8s ease-out infinite");
        }, delay);
      }

      const grp = svg.append("g").style("cursor", (isReady || isSoon) ? "pointer" : "default");
      const dot = grp.append("circle")
        .attr("cx",cx).attr("cy",cy).attr("r",dotR)
        .attr("fill",dotColor).attr("stroke",dotStroke)
        .attr("stroke-width", isPrimary ? 1.5 : 1)
        .style("opacity",0);

      if (animate) setTimeout(() => dot.style("animation","popDot .4s cubic-bezier(.34,1.56,.64,1) forwards"), c.delay * 1000);
      else dot.style("opacity",1);

      if (isReady) {
        grp
          .on("mouseenter", () => {
            dot.transition().duration(150).attr("fill","#ff8a82").attr("r", dotR * 1.5);
            showTooltip(cx, cy, c.name, "● Ready · Click to explore", false);
          })
          .on("mouseleave", () => {
            dot.transition().duration(150).attr("fill",dotColor).attr("r",dotR);
            hideTooltip();
          })
          .on("click", () => {
            if (window.parent && window.parent !== window) {
              window.parent.postMessage({ type: "cityClick", city: "Brussels" }, "*");
            }
          });
      }

      if (isSoon) {
        grp
          .on("mouseenter", () => {
            dot.transition().duration(150).attr("r", dotR * 1.4).attr("fill","rgba(255,255,255,0.65)");
            showTooltip(cx, cy, c.name, "In Development..", true);
          })
          .on("mouseleave", () => {
            dot.transition().duration(150).attr("r",dotR).attr("fill",dotColor);
            hideTooltip();
          });
      }

      const fontSize = Math.max(6, W * 0.011);
      if (isPrimary || labelCities.includes(c.name)) {
        const lx = cx + dotR + 3;
        const ly = cy - dotR - 2;
        
const labelFill = isReady
  ? "#ffb0aa"
  : isSoon
    ? "rgba(255,255,255,0.88)"
    : "rgba(255,255,255,0.75)";
        
        const labelW = c.name.length * fontSize * 0.62 + 8;

        if (isPrimary) {
          const bgStroke = isReady ? "rgba(255,59,48,0.4)" : "rgba(255,255,255,0.12)";
          const bg = svg.append("rect")
            .attr("x",lx-1).attr("y",ly-fontSize)
            .attr("width",labelW).attr("height",fontSize+4).attr("rx",3)
            .attr("fill","rgba(8,10,18,0.85)").attr("stroke",bgStroke).attr("stroke-width",0.7)
            .style("opacity",0);
          if (animate) setTimeout(() => bg.style("animation","fadeLabel .4s ease forwards"), (c.delay + 0.25) * 1000);
          else bg.style("opacity",1);
        }

        const lbl = svg.append("text")
          .attr("x", isPrimary ? lx + 3 : lx)
          .attr("y", isPrimary ? ly : ly)
          .attr("font-family","Inter,system-ui,sans-serif")
          .attr("font-size", isPrimary ? fontSize : fontSize * 0.88)
          .attr("font-weight", isPrimary ? 700 : 500)
          .attr("fill", labelFill)
          .attr("letter-spacing", isPrimary ? "0.05em" : "0")
          .text(c.name.toUpperCase())
          .style("opacity",0);

        if (animate) setTimeout(() => lbl.style("animation","fadeLabel .4s ease forwards"), (c.delay + 0.28) * 1000);
        else lbl.style("opacity",1);
      }
    });
  }

  render(true);

  setTimeout(() => document.getElementById("overlay-brand").classList.add("show"), 3200);
  setTimeout(() => document.getElementById("pw-panel").classList.add("slide-in"), 4000);

  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => render(false), 120);
  });

  /* ── Password ── */
  const pwInput = document.getElementById("pw-input");
  const pwBtn   = document.getElementById("pw-btn");
  const pwMsg   = document.getElementById("pw-msg");

  function tryPassword() {
    const val = pwInput.value.trim();
    if (val === PASSWORD_FREE) {
      pwInput.classList.remove("error"); pwInput.classList.add("success");
      pwMsg.style.color = "rgba(80,220,120,0.9)"; pwMsg.style.opacity = "1";
      pwMsg.textContent = "✓ Access granted";
      pwBtn.textContent = "✓";
      pwBtn.style.background  = "rgba(80,220,120,0.15)";
      pwBtn.style.borderColor = "rgba(80,220,120,0.4)";
      pwBtn.style.color       = "rgba(80,220,120,0.9)";
      if (window.parent && window.parent !== window)
        window.parent.postMessage({ type: "unlock", password: val }, "*");
    } else if (val === PASSWORD_PREMIUM) {
      pwInput.classList.remove("error"); pwInput.classList.add("success");
      pwMsg.style.color = "#ffd84d"; pwMsg.style.opacity = "1";
      pwMsg.textContent = "★ Premium";
      pwBtn.textContent = "★";
      pwBtn.style.background  = "rgba(255,216,77,0.12)";
      pwBtn.style.borderColor = "rgba(255,216,77,0.4)";
      pwBtn.style.color       = "#ffd84d";
      if (window.parent && window.parent !== window)
        window.parent.postMessage({ type: "unlock", password: val }, "*");
    } else {
      pwInput.classList.remove("success"); pwInput.classList.add("error");
      pwMsg.style.color = "rgba(255,80,80,0.9)"; pwMsg.style.opacity = "1";
      pwMsg.textContent = "✕ Wrong password";
      setTimeout(() => { pwInput.classList.remove("error"); pwMsg.style.opacity = "0"; }, 1500);
    }
  }

  pwBtn.addEventListener("click", tryPassword);
  pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryPassword(); });
})();
</script>
</body>
</html>
